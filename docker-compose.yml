services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: techthrive
      POSTGRES_USER: techthrive
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgres://techthrive:devpassword@db:5432/techthrive
    depends_on:
      - db

volumes:
  postgres_data:
